<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Produtos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <h1>📋 Gerenciador de Produtos</h1>
        <p class="subtitle">Aplicação de Gestão de Estoque</p>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="form-section">
          <h2>Adicionar ou Editar Produto</h2>
          <form id="productForm">
            <div class="form-group">
              <label for="nomeProd">Nome do Produto:</label>
              <input type="text" id="nomeProd" placeholder="Ex: Teclado Mecânico" required />
            </div>

            <div class="form-group">
              <label for="preco">Preço (R$):</label>
              <input type="number" id="preco" step="0.01" placeholder="0.00" required />
            </div>

            <div class="form-group">
              <label for="catProd">Categoria:</label>
              <input type="text" id="catProd" placeholder="Ex: Periféricos" required />
            </div>

            <div class="form-group">
              <label for="modelo">Modelo:</label>
              <input type="text" id="modelo" placeholder="Ex: K600" required />
            </div>

            <div class="form-group">
              <label for="fabricante">Fabricante:</label>
              <input type="text" id="fabricante" placeholder="Ex: Marca XYZ" required />
            </div>

            <div class="form-group">
              <label for="estoque">Estoque (Qtd):</label>
              <input type="number" id="estoque" placeholder="0" required />
            </div>

            <div class="form-group">
              <label for="locall">Localização:</label>
              <input type="text" id="locall" placeholder="Ex: Corredor B, Prateleira 3" required />
            </div>

            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">Salvar Produto</button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">Limpar Formulário</button>
            </div>
          </form>
        </section>

        <section class="list-section">
          <h2>Lista de Produtos</h2>

          <div class="list-controls">
            <div class="search-box">
              <select id="searchType" title="Selecionar tipo de busca">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>
              <input type="text" id="searchInput" placeholder="Digite o valor para buscar..." />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
              <button class="btn btn-success" id="btnRecarregar">🔄 Recarregar</button>
            </div>
          </div>

          <div id="loadingMessage" class="message message-info">Carregando produtos...</div>
          <div id="emptyMessage" class="message message-info">Nenhum produto cadastrado. Adicione um novo produto usando o formulário.</div>

          <div id="productsList" class="clients-table-container">
            </div>
        </section>
      </div>
    </main>

    <div id="modalMessage" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 400px; color: #4a4a4a;">
            <p id="modalText" style="margin-bottom: 20px; font-weight: bold;"></p>
            <button onclick="fecharModal()" class="btn btn-primary">Ok</button>
        </div>
    </div>

    <footer>
      <p>&copy; 2026 - Sistema de Gestão | Desenvolvido para Alunos de Desenvolvimento de Sistemas</p>
    </footer>
 
    <script src="script.js"></script>
  </body>
</html>
